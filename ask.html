<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>ask</title>
</head>
<body>
    <div class="askCo">
        <span>🗓️🐾</span>
        <h1>So... when are you free?</h1>
        
        <form id="dateForm">
            <label for="date">Pick a Day</label>
            <input type="date" id="date" name="date" required>
            
            <label for="time">What Time?⏰</label>
            <select name="time" id="time" required>
                <option value="">Select a time...</option>
                <option value="5:00 PM">5:00 PM -- we eating with the retirees</option>
                <option value="6:00 PM">6:00 PM -- this is the right answer ish</option>
                <option value="7:00 PM">7:00 PM -- you're making me hungry already</option>
                <option value="8:00 PM">8:00 PM -- we eating dinner or breakfast?</option>
            </select>
            
            <button type="submit" id="submit">Set the date 💌</button>
        </form>
    </div>

    <script>
        document.getElementById("dateForm").addEventListener("submit", function(event) {
            event.preventDefault();
            
            const date = document.getElementById("date").value;
            const time = document.getElementById("time").value;
            
            if (!date || !time) {
                alert("Please fill in both date and time!");
                return;
            }
            
            // Store data in localStorage
            localStorage.setItem("date", date);
            localStorage.setItem("time", time);
            
            // Navigate to food page
            window.location.href = "food.html";
        });
    </script>
</body>
</html>
