<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <title>final</title>
</head>
<body>
    <div class="finCo">
        <img class="shr" src="./assets/shrek.png" />
        <h1>glad you didn't say no. be ready by 6, I'm coming to get you 🚗</h1>
        <p>P.S normal people text. I made a website on Replit, during lunch for you no big deal</p>
    </div>

    <script>
        (function(){
            emailjs.init("YOUR_PUBLIC_KEY"); // Replace with your EmailJS public key
        })();

        // Get all data from localStorage
        const date = localStorage.getItem("date");
        const time = localStorage.getItem("time");
        const food = localStorage.getItem("food");

        // Prepare the email data
        const templateParams = {
            date: date || "Not specified",
            time: time || "Not specified",
            food: food || "Not specified",
            message: `Date Details:
            - Date: ${date || "Not specified"}
            - Time: ${time || "Not specified"}
            - Food Choice: ${food || "Not specified"}`
        };

        // Send the email
        emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", templateParams)
            .then(function(response) {
                console.log("SUCCESS!", response.status, response.text);
                // Clear localStorage after sending
                localStorage.clear();
            }, function(error) {
                console.log("FAILED...", error);
                // Still clear localStorage even if email fails
                localStorage.clear();
            });
    </script>
</body>
</html>
